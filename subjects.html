<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{

--primary:#2563eb;
--secondary:#3b82f6;
--accent:#06b6d4;

--bg:#eef4ff;

--card:#ffffffdd;

--text:#0f172a;

--muted:#64748b;

--shadow:0 15px 45px rgba(37,99,235,.15);

--radius:24px;

}

body{

font-family:Inter,sans-serif;

background:
linear-gradient(135deg,#edf4ff,#f9fbff);

min-height:100vh;

color:var(--text);

overflow-x:hidden;

}

body::before{

content:"";

position:fixed;

width:400px;

height:400px;

background:#60a5fa33;

filter:blur(90px);

top:-120px;

right:-120px;

border-radius:50%;

z-index:-2;

}

body::after{

content:"";

position:fixed;

width:350px;

height:350px;

background:#22d3ee22;

filter:blur(90px);

bottom:-100px;

left:-100px;

border-radius:50%;

z-index:-2;

}

.container{

width:min(1100px,95%);

margin:auto;

padding:25px 0 40px;

}

.hero{

background:

linear-gradient(135deg,#2563eb,#1d4ed8);

border-radius:35px;

padding:35px;

color:white;

position:relative;

overflow:hidden;

box-shadow:0 25px 60px rgba(37,99,235,.3);

}

.hero::before{

content:"";

position:absolute;

width:240px;

height:240px;

background:rgba(255,255,255,.08);

border-radius:50%;

top:-90px;

right:-70px;

}

.hero::after{

content:"";

position:absolute;

width:180px;

height:180px;

background:rgba(255,255,255,.08);

bottom:-80px;

left:-50px;

border-radius:50%;

}

.hero-content{

display:flex;

align-items:center;

gap:25px;

position:relative;

z-index:2;

}

.logo{

width:95px;

height:95px;

background:white;

border-radius:22px;

padding:10px;

object-fit:contain;

box-shadow:0 15px 30px rgba(0,0,0,.18);

}

.hero h1{

font-size:34px;

font-weight:800;

margin-bottom:8px;

}

.hero p{

font-size:16px;

opacity:.9;

}

.stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:18px;

margin-top:30px;

}

.stat{

background:rgba(255,255,255,.18);

backdrop-filter:blur(15px);

padding:20px;

border-radius:22px;

text-align:center;

border:1px solid rgba(255,255,255,.15);

}

.stat h2{

font-size:30px;

margin-bottom:5px;

}

.stat span{

font-size:14px;

opacity:.9;

}

.search{

margin:30px 0;

}

.search input{

width:100%;

padding:18px 24px;

border:none;

outline:none;

font-size:16px;

border-radius:20px;

background:white;

box-shadow:var(--shadow);

}

.tabs{

display:flex;

gap:12px;

overflow:auto;

padding-bottom:10px;

scrollbar-width:none;

margin-bottom:30px;

}

.tabs::-webkit-scrollbar{

display:none;

}

.tab{

padding:13px 22px;

border-radius:999px;

background:white;

cursor:pointer;

font-weight:700;

white-space:nowrap;

transition:.3s;

box-shadow:0 5px 20px rgba(0,0,0,.05);

}

.tab.active{

background:linear-gradient(135deg,#2563eb,#3b82f6);

color:white;

transform:translateY(-3px);

}

.subjects{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(260px,1fr));

gap:22px;

}

.subject-card{

background:var(--card);

backdrop-filter:blur(20px);

border-radius:24px;

padding:22px;

box-shadow:var(--shadow);

transition:.35s;

display:flex;

justify-content:space-between;

align-items:center;

text-decoration:none;

color:inherit;

}

.subject-card:hover{

transform:translateY(-8px);

}

.subject-left{

display:flex;

align-items:center;

gap:15px;

}

.icon{

width:58px;

height:58px;

border-radius:18px;

display:flex;

align-items:center;

justify-content:center;

font-size:24px;

color:white;

font-weight:700;

}

.subject-name{

font-size:18px;

font-weight:700;

}

.subject-type{

font-size:14px;

color:var(--muted);

margin-top:4px;

}

.arrow{

font-size:26px;

color:var(--primary);

}

.footer{

margin-top:45px;

text-align:center;

padding:30px;

color:var(--muted);

font-size:15px;

}

@media(max-width:768px){

.hero-content{

flex-direction:column;

text-align:center;

}

.hero h1{

font-size:28px;

}

.stats{

grid-template-columns:repeat(2,1fr);

}

.subjects{

grid-template-columns:1fr;

}

}

</style>

</head>

const gradesOrder = [8,9,10,11,12,"MDCAT","DIT"];

let currentGrade = gradesOrder[0];

const subjectIcons={
"Biology":"🧬",
"Chemistry":"⚗️",
"Physics":"⚛️",
"Computer Science":"💻",
"English":"📘",
"Urdu":"🖋️",

};

const iconColors={
"Biology":"#22c55e",
"Chemistry":"#8b5cf6",
"Physics":"#3b82f6",
"Computer Science":"#06b6d4",
"English":"#f59e0b",
"Urdu":"#ef4444",
"Islamiat":"#10b981",
"Mutalia-e-Quran":"#14b8a6",

"Web Development Essentials":"#2563eb",
"Database Systems":"#7c3aed",
"ICT":"#ec4899",
"Computer Network":"#6366f1"
};
function buildTabs(){

    const tabBar=document.getElementById("tabBar");

    tabBar.innerHTML="";

    gradesOrder.forEach(grade=>{

        const tab=document.createElement("div");

        tab.className="tab";

        if(currentGrade===grade)
            tab.classList.add("active");



tab.innerText=
            grade==="DIT"
            ?"DIT"
            :"Grade "+grade;

if (grade === "MDCAT") tab.innerText = "MDCAT";

        tab.onclick=()=>{

            currentGrade=grade;

            buildTabs();

            renderSubjects();

        };

        tabBar.appendChild(tab);

    });

}

function renderSubjects(){

    const container=document.getElementById("subjectsContainer");

    container.innerHTML="";

    const search=document
    .getElementById("searchBox")
    .value
    .toLowerCase();

    let subjects=gradeData[currentGrade]||[];

    subjects=subjects.filter(subject=>
        subject.name
        .toLowerCase()
        .includes(search)
    );

    if(subjects.length===0){

        container.innerHTML=`
        <div style="
        grid-column:1/-1;
        text-align:center;
        padding:80px 20px;
        background:#fff;
        border-radius:24px;
        box-shadow:0 10px 30px rgba(0,0,0,.08);
        ">
            <h2>No Subjects Found</h2>
            <p>Try another keyword.</p>
        </div>
        `;

        return;

    }

    subjects.forEach(subject=>{

        const card=document.createElement("a");

        card.className="subject-card";

        card.href=subject.url;

        card.target="_blank";

        card.rel="noopener";

        card.innerHTML=`

        <div class="subject-left">

            <div
            class="icon"
            style="background:${iconColors[subject.name]||'#2563eb'}">

            ${subjectIcons[subject.name]||'📚'}

            </div>

            <div>

                <div class="subject-name">

                    ${subject.name}

                </div>

                <div class="subject-type">

                    Presentation

                </div>

            </div>

        </div>

        <div class="arrow">

            →

        </div>

        `;

        container.appendChild(card);

    });

}

document
.getElementById("searchBox")
.addEventListener("input",renderSubjects);

buildTabs();

renderSubjects();
